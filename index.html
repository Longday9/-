<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研复习知识导图工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 隐藏滚动条但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 树形连线效果的简单微调 */
        .tree-node::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 24px;
            border-left: 2px dashed #cbd5e1;
            height: calc(100% - 12px);
        }
        .tree-node:last-child::before {
            height: 16px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<div id="app" class="flex h-screen overflow-hidden" v-cloak>
    
    <div class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between">
        <div>
            <div class="p-4 border-b border-gray-200">
                <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    🎓 <span>考研复习导图</span>
                </h1>
                <p class="text-xs text-gray-500 mt-1">点击节点展开/隐藏内容编辑器</p>
            </div>
            <div class="p-4 space-y-2">
<div class="flex justify-between items-center mb-2">
    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">当前科目</label>
    <button @click="addSubject" class="text-[11px] text-indigo-400 hover:text-indigo-300 font-semibold">+ 添加科目</button>
</div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">当前科目</label>
                <div class="space-y-1">
                    <button v-for="sub in subjects" :key="sub.id"
                            @click="switchSubject(sub.id)"
                            :class="['w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors', 
                                    currentSubjectId === sub.id ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-100']">
                        {{ sub.name }}
                    </button>
                </div>
            </div>
        </div>
        <div class="p-4 border-t border-gray-200 space-y-2">
            <button @click="exportData" class="w-full py-1.5 text-xs text-center border border-gray-300 rounded hover:bg-gray-50 transition">导出备份 (JSON)</button>
            <button @click="importData" class="w-full py-1.5 text-xs text-center border border-gray-300 rounded hover:bg-gray-50 transition text-red-600">导入备份</button>
            <p class="text-[10px] text-gray-400 text-center">数据自动实时保存在本地浏览器</p>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        
        <div class="flex-1 overflow-auto p-8 no-scrollbar bg-slate-50">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">{{ currentSubject.name }} 知识架构</h2>
                    <button @click="addRootNode" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded-md hover:bg-indigo-700 shadow-sm transition">
                        + 添加根主干
                    </button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <div v-if="currentSubject.tree.length === 0" class="text-center py-12 text-gray-400 text-sm">
                        暂无节点，点击右上方按钮开始构建你的知识树
                    </div>
                    <tree-item 
                        v-for="(node, index) in currentSubject.tree" 
                        :key="node.id" 
                        :node="node" 
                        :active-id="activeNodeId"
                        @select="selectNode"
                        @add-child="addChildNode"
                        @delete-node="deleteNode(currentSubject.tree, index)">
                    </tree-item>
                </div>
            </div>
        </div>

        <div :class="['w-96 bg-white border-l border-gray-200 flex flex-col transition-all duration-200', 
                     activeNode ? 'translate-x-0' : 'translate-x-full w-0 overflow-hidden']">
            <div v-if="activeNode" class="h-full flex flex-col">
                <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                    <span class="text-xs font-semibold px-2 py-1 bg-indigo-100 text-indigo-800 rounded">内容编辑器</span>
                    <button @click="activeNodeId = null" class="text-gray-400 hover:text-gray-600 text-sm">✕ 关闭</button>
                </div>
                
                <div class="p-4 flex-1 flex flex-col gap-4 overflow-y-auto">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">节点名称</label>
                        <input type="text" v-model="activeNode.label" @input="saveToLocalStorage"
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500 font-medium text-base">
<div class="bg-indigo-50 border border-indigo-100 p-3 rounded-lg my-2">
    <label class="block text-[11px] font-bold text-indigo-900">🌌 知识联想传送门</label>
    <select v-model="selectedNode.targetPortalId" @change="saveToLocal" class="w-full mt-1 p-1 text-xs bg-white border rounded text-slate-700">
        <option :value="undefined">-- 点击绑定跨界考点 --</option>
        <optgroup v-for="sub in subjects" :label="sub.name">
            <optgroup v-for="chap in sub.chapters" :label="'   └ ' + chap.name">
                <option v-for="flatNode in flattenTree(chap.tree)" :key="flatNode.id" :disabled="flatNode.id === selectedNode.id" :value="sub.id + '|' + chap.id + '|' + flatNode.id">
                    {{ flatNode.label }}
                </option>
            </optgroup>
        </optgroup>
    </select>
</div>
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <label class="block text-xs font-bold text-gray-500 mb-1">
                            背诵内容 / 核心笔记 
                            <span class="text-[10px] text-gray-400 font-normal">(支持换行，可放入公式或考点)</span>
                        </label>
                        <textarea v-model="activeNode.content" @input="saveToLocalStorage"
                                  placeholder="在此输入该节点的详细笔记、公式、错题总结或背诵口诀..."
                                  class="w-full flex-1 p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm resize-none leading-relaxed bg-slate-50"></textarea>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const { createApp, ref, computed, watch, onMounted } = Vue;

// 树形节点组件（递归调用自身）
const TreeItem = {
    name: 'TreeItem',
    props: ['node', 'activeId'],
    emits: ['select', 'addChild', 'deleteNode'],
    template: `
        <div class="relative pl-6 tree-node">
            <div class="flex items-center gap-2 my-2 group">
                <div @click="$emit('select', node)" 
                     :class="['px-3 py-1.5 rounded-md cursor-pointer border transition-all text-sm flex items-center gap-1.5 shadow-sm',
                              activeId === node.id 
                              ? 'bg-indigo-600 text-white border-indigo-600' 
                              : 'bg-gray-50 hover:bg-indigo-50 text-gray-700 border-gray-200 hover:border-indigo-300']">
                    <span v-if="node.children && node.children.length" class="text-[10px] opacity-70">
                        {{ node.expanded ? '▼' : '►' }}
                    </span>
                    <span class="font-medium">{{ node.label || '新节点' }}</span>
                    <span v-if="node.content" class="text-[10px] bg-emerald-500 text-white px-1 rounded scale-90">📝 笔记</span>
                </div>

                <div class="opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
                    <button @click.stop="$emit('addChild', node)" class="p-1 text-xs text-indigo-600 hover:bg-indigo-50 rounded" title="添加子节点">＋</button>
                    <button @click.stop="$emit('deleteNode')" class="p-1 text-xs text-red-500 hover:bg-red-50 rounded" title="删除此节点">✕</button>
                </div>
            </div>

            <div v-if="node.children && node.children.length && node.expanded" class="ml-2">
                <tree-item 
                    v-for="(child, index) in node.children<button v-if="child.targetPortalId" @click.stop="handlePortalJump(child.targetPortalId)" class="mt-1 text-[10px] bg-purple-600 text-white px-1 py-0.5 rounded shadow">
    🌌 传送
</button>" 
                    :key="child.id" 
                    :node="child"
                    :active-id="activeId"
                    @select="$emit('select', $event)"
                    @add-child="$emit('addChild', $event)"
                    @delete-node="node.children.splice(index, 1)">
                </tree-item>
            </div>
        </div>
    `
};

createApp({
    components: { TreeItem },
    setup() {
        // 初始化默认内置考研科目模板
        const defaultSubjects = [
            {
                id: '408',
                name: '计算机408',
                tree: [
                    {
                        id: '1', label: '数据结构', expanded: true, content: '大题常考：二叉树遍历、图的算法（Dijkstra/Prim）、各种排序算法性能对比。',
                        children: [
                            { id: '1-1', label: '线性表', expanded: true, content: '顺序表与链表的插入删除时间复杂度。', children: [] },
                            { id: '1-2', label: '树与二叉树', expanded: true, content: '平衡二叉树（AVL）、红黑树的基本性质。', children: [] }
                        ]
                    },
                    { id: '2', label: '计算机组成原理', expanded: false, content: '核心：数据的表示与运算、存储器层次结构、CPU指令流水线。', children: [] },
                    { id: '3', label: '操作系统', expanded: false, content: '核心：PV操作同步互斥、虚拟内存页面置换算法、磁盘调度。', children: [] },
                    { id: '4', label: '计算机网络', expanded: false, content: '核心：IP子网划分、TCP流量控制与拥塞控制、三次握手。', children: [] }
                ]
            },
            {
                id: 'math',
                name: '考研数学',
                tree: [
                    { id: 'm1', label: '高等数学', expanded: true, content: '核心定理：泰勒公式、中值定理、定积分的应用。', children: [] },
                    { id: 'm2', label: '线性代数', expanded: false, content: '矩阵的秩、特征值与特征向量、二次型。', children: [] }
                ]
            },
            {
                id: 'politics',
                name: '考研政治',
                tree: [
                    { id: 'p1', label: '马原', expanded: true, content: '唯物辩证法两大总特征：联系和发展。三规律：对立统一、质量互变、否定之否定。', children: [] },
                    { id: 'p2', label: '毛中特', expanded: false, content: '新时代中国特色社会主义思想核心内容。', children: [] }
                ]
            }
        ];

        const subjects = ref([]);
        const currentSubjectId = ref('408');
        const activeNodeId = ref(null);

        // 从 LocalStorage 加载或初始化
        onMounted(() => {
            const savedData = localStorage.getItem('kaoyan_mindmap_data');
            if (savedData) {
                try {
                    subjects.value = JSON.parse(savedData);
                } catch (e) {
                    subjects.value = defaultSubjects;
                }
            } else {
                subjects.value = defaultSubjects;
            }
        });

        // 当前选中的科目数据
        const currentSubject = computed(() => {
            return subjects.value.find(s => s.id === currentSubjectId.value) || subjects.value[0] || { name: '', tree: [] };
        });

        // 当前正在编辑的节点对象
        const activeNode = computed(() => {
            if (!activeNodeId.value) return null;
            return findNodeById(currentSubject.value.tree, activeNodeId.value);
        });

        // 辅助函数：通过ID递归查找节点
        function findNodeById(nodes, id) {
            for (let node of nodes) {
                if (node.id === id) return node;
                if (node.children && node.children.length) {
                    const found = findNodeById(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // 切换科目
        function switchSubject(id) {
            currentSubjectId.value = id;
            activeNodeId.value = null;
        }

        // 点击节点：再次点击同一个节点则隐藏侧边栏
        function selectNode(node) {
            if (activeNodeId.value === node.id) {
                activeNodeId.value = null; // 再次点击隐藏
            } else {
                activeNodeId.value = node.id; // 点击展开/编辑
                node.expanded = !node.expanded; // 顺便联动折叠/展开子节点
            }
        }

        // 添加根节点
        function addRootNode() {
            const newId = 'root_' + Date.now();
            currentSubject.value.tree.push({
                id: newId,
                label: '新主干考点',
                content: '',
                expanded: true,
                children: []
            });
            activeNodeId.value = newId;
            saveToLocalStorage();
        }

        // 添加子节点
function addChildNode() {
    if (!selectedNode.value) return;
    
    // 如果当前选中的节点还没有下级容器，给它初始化一个
    if (!selectedNode.value.children) {
        selectedNode.value.children = [];
    }
    
    const newId = 'n_' + Date.now();
    // 关键改变：直接 push 到当前选中的节点下面，实现无限级衍生！
    selectedNode.value.children.push({
        id: newId,
        label: '下级细分考点',
        status: 'clear',
        note: '',
        children: []
    });
    
    // 自动追踪选中新创建的节点
    selectedNode.value = selectedNode.value.children[selectedNode.value.children.length - 1];
    saveToLocal();
}
        // 删除根节点（子节点的删除在组件内直接处理了）
        function deleteNode(parentArray, index) {
            if (confirm('确定要删除这个节点及其所有子节点吗？')) {
                parentArray.splice(index, 1);
                activeNodeId.value = null;
                saveToLocalStorage();
            }
        }

        // 数据持久化
        function saveToLocalStorage() {
            localStorage.setItem('kaoyan_mindmap_data', JSON.stringify(subjects.value));
        }

        // 深度监听整个数据变化自动保存
        watch(subjects, () => {
            saveToLocalStorage();
        }, { deep: true });

        // 备份导出
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(subjects.value, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `考研复习导图备份_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // 备份导入
        function importData() {
            const jsonStr = prompt("请粘贴之前导出的 JSON 备份文本（警告：这会覆盖当前的所有数据）：");
            if (jsonStr) {
                try {
                    const parsed = JSON.parse(jsonStr);
                    if (Array.isArray(parsed)) {
                        subjects.value = parsed;
                        saveToLocalStorage();
                        alert("导入成功！");
                    } else {
                        alert("格式不正确，请确保复制的是完整的备份文本。");
                    }
                } catch (e) {
                    alert("解析失败，请输入有效的 JSON 数据。");
                }
            }
        }
	// 1. 添加科目功能
function addSubject() {
    const name = prompt("请输入全新科目名称：");
    if (name) {
        const sid = 'sub_' + Date.now();
        subjects.value.push({ id: sid, name: name, chapters: [] });
        switchSubject(sid);
        saveToLocal();
    }
}

// 2. 传送门瞬间横跳穿梭机制
function handlePortalJump(portalStr) {
    const [subId, chapId, nodeId] = portalStr.split('|');
    currentSubjectId.value = subId;
    currentChapterId.value = chapId;
    
    setTimeout(() => {
        // 递归查找目标节点并高亮选中
        const findNode = (root, id) => {
            if (root.id === id) return root;
            if (root.children) {
                for (let c of root.children) {
                    const res = findNode(c, id);
                    if (res) return res;
                }
            }
            return null;
        };
        const target = findNode(currentChapter.value.tree, nodeId);
        if (target) {
            selectedNode.value = target;
            alert(`✨ 穿梭成功！已带你降落到关联考点：【${target.label}】`);
        }
    }, 50);
}

// 3. 辅助函数：将树拉平，用于生成下拉菜单选择
function flattenTree(root) {
    let result = [];
    if (!root) return result;
    function traverse(node) {
        result.push({ id: node.id, label: node.label });
        if (node.children) node.children.forEach(traverse);
    }
    traverse(root);
    return result;
}
        return {
            subjects,
            currentSubjectId,
            currentSubject,
            activeNodeId,
            activeNode,
            switchSubject,
            selectNode,
            addRootNode,
            addChildNode,
            deleteNode,
            exportData,
            importData,
	addSubject,
handlePortalJump,
flattenTree,
            saveToLocalStorage
        };
    }
}).mount('#app');
</script>
</body>
</html>
